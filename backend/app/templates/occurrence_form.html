{% extends "base.html" %}
{% block title %}Nova Ocorrência{% endblock %}
{% block content %}
<article>
  <h3>Nova Ocorrência</h3>
  <form method="post" action="/occurrence/create" enctype="multipart/form-data">
    <label>Título<input type="text" name="title" required></label>
    <label>Descrição<textarea name="description" rows="6" required></textarea></label>
    <label>Anexos (imagens/PDFs)<input type="file" name="files" multiple></label>
    <button type="submit">Salvar</button>
  </form>
</article>
{% endblock %}
