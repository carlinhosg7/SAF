<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SAF</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
        }

        .box {
            width: 380px;
            background: #1e293b;
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,.25);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .erro {
            margin-bottom: 16px;
            padding: 10px;
            border-radius: 8px;
            background: #7f1d1d;
            color: #fecaca;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Login SAF</h1>

        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}

        <form method="post" action="/login">
            <label for="codigo_usuario">Código do Usuário</label>
            <input type="text" id="codigo_usuario" name="codigo_usuario" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>

            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
